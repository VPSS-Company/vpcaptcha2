<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30-in-1 CAPTCHA Challenge Selector</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom styling for the slider track */
        .slider-track {
            height: 8px;
            background: #4b5563; /* Gray-600 */
            border-radius: 4px;
        }
        .slider-thumb {
            width: 30px;
            height: 30px;
            background: #22c55e; /* Green-500 */
            border-radius: 50%;
            cursor: pointer;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
            transition: all 0.1s;
        }
        .slider-thumb:active {
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.8);
        }
        /* Style for the puzzle piece (for Click CAPTCHA) */
        .puzzle-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }
        .puzzle-item {
            aspect-ratio: 1 / 1;
            background-color: #374151; /* Gray-700 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #d1d5db;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        .puzzle-item:hover {
            background-color: #4b5563; /* Gray-600 */
            transform: scale(1.02);
        }
        .puzzle-item.selected {
            border: 4px solid #f97316; /* Orange-500 */
            background-color: #f9731633;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4 sm:p-8">

    <!-- Header -->
    <header class="text-center mb-12">
        <h1 class="text-5xl sm:text-6xl font-extrabold text-white mb-2">
            CAPTCHA <span class="text-green-400">Challenge</span> Hub
        </h1>
        <p class="text-gray-400 text-xl">Select one of the 30 challenges to unlock the next page.</p>
    </header>

    <!-- Main Content Grid -->
    <div id="challenge-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 max-w-7xl mx-auto">
        <!-- Challenge Cards will be injected here by JavaScript -->
    </div>

    <!-- Success Page Simulation (Initially hidden) -->
    <div id="success-page" class="hidden fixed inset-0 bg-gray-900 bg-opacity-95 backdrop-blur-sm flex flex-col items-center justify-center p-8 z-50">
        <div class="bg-white p-10 rounded-xl shadow-2xl text-center max-w-lg w-full">
            <svg class="w-20 h-20 text-green-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <h2 class="text-3xl font-bold text-gray-900 mb-4">Success! Access Granted.</h2>
            <p class="text-gray-600 mb-6">You have successfully proven you are human by solving the CAPTCHA challenge. This is the simulated "Next Page."</p>
            <button onclick="resetApp()" class="px-6 py-3 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition duration-150 shadow-md">
                Return to Challenges
            </button>
        </div>
    </div>


    <!-- Dynamic CAPTCHA Modal (Initially hidden) -->
    <div id="captcha-modal-overlay" class="hidden fixed inset-0 bg-gray-900 bg-opacity-80 backdrop-blur-sm flex items-center justify-center p-4 z-40">
        <div id="captcha-container" class="bg-gray-800 rounded-2xl shadow-2xl p-6 sm:p-10 w-full max-w-lg transform transition-all duration-300 scale-100">

            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-green-400">Prove You're Not a Bot</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white transition duration-150">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div id="challenge-content" class="min-h-[150px]">
                <!-- Dynamic content (Math, Text, Click, Slider) will be injected here -->
            </div>

            <!-- Validation Feedback -->
            <p id="feedback" class="text-sm mt-4 font-medium min-h-[20px]"></p>

            <div class="mt-8 flex justify-end space-x-3">
                <button onclick="closeModal()" class="px-4 py-2 text-sm font-medium text-gray-300 rounded-lg hover:bg-gray-700 transition duration-150">
                    Cancel
                </button>
                <button id="submit-btn" onclick="checkSolution()" class="px-6 py-3 bg-green-600 text-white font-semibold rounded-lg hover:bg-green-700 transition duration-150 shadow-md">
                    Verify
                </button>
            </div>

        </div>
    </div>

<script>
    // Global state
    let currentChallenge = null;
    const challengeGrid = document.getElementById('challenge-grid');
    const challengeContent = document.getElementById('challenge-content');
    const modalOverlay = document.getElementById('captcha-modal-overlay');
    const feedbackEl = document.getElementById('feedback');
    const submitBtn = document.getElementById('submit-btn');

    // --- CAPTCHA DEFINITIONS (30 Challenges) ---
    // Each challenge has a type, prompt, and a specific solution/data structure.
    const CAPTCHA_CHALLENGES = [
        // --- 6 x Simple Math CAPTCHAs ---
        { id: 1, type: 'math', name: 'Simple Addition', prompt: 'What is $12 + 7$?', solution: 19 },
        { id: 2, type: 'math', name: 'Simple Subtraction', prompt: 'What is $25 - 9$?', solution: 16 },
        { id: 3, type: 'math', name: 'Simple Multiplication', prompt: 'What is $6 \\times 4$?', solution: 24 },
        { id: 4, type: 'math', name: 'Mixed Operation 1', prompt: 'What is $(10 + 5) \\times 2$?', solution: 30 },
        { id: 5, type: 'math', name: 'Division Remainder', prompt: 'What is $21 \\div 3$?', solution: 7 },
        { id: 6, type: 'math', name: 'Order of Operations', prompt: 'What is $3 + 4 \\times 2$?', solution: 11 },

        // --- 6 x Text Input CAPTCHAs ---
        { id: 7, type: 'text', name: 'Spell a Color', prompt: 'Spell the color of a banana.', solution: 'YELLOW' },
        { id: 8, type: 'text', name: 'Reverse Word', prompt: 'Type the word "PANDA" backwards.', solution: 'ADNAP' },
        { id: 9, type: 'text', name: 'First Letter of a Quote', prompt: 'What is the first letter of "The quick brown fox jumps over the lazy dog."?', solution: 'T' },
        { id: 10, type: 'text', name: 'Case-Sensitive Code', prompt: 'Enter the code: J7kLp (Case-sensitive)', solution: 'J7kLp' },
        { id: 11, type: 'text', name: 'Fill in the Blank', prompt: 'The sky is often \_\_\_\_\_ (4 letters).', solution: 'BLUE' },
        { id: 12, type: 'text', name: 'Homophone Input', prompt: 'Type the sound a dog makes (3 letters).', solution: 'WOOF' },

        // --- 6 x Click/Selection CAPTCHAs (Select the item) ---
        { id: 13, type: 'click', name: 'Select the Letter', prompt: 'Click the box containing the letter "B".', items: ['A', 'C', 'B', 'D', 'E', 'F', 'G', 'H', 'I'], solution: 2 },
        { id: 14, type: 'click', name: 'Select the Prime Number', prompt: 'Click the box with a prime number.', items: [4, 9, 12, 7, 15, 20, 1, 10, 8], solution: 3 },
        { id: 15, type: 'click', name: 'Select the Fruit', prompt: 'Click the box containing a common fruit (Emoji).', items: ['🚗', '🍎', '🏠', '🔑', '📞', '💡', '📚', '🗺️', '⏰'], solution: 1 },
        { id: 16, type: 'click', name: 'Select the Shape', prompt: 'Click the square shape.', items: ['▲', '⬤', '▰', '★', '◆', '⬟', '⭓', '⬡', '⬢'], solution: 2 },
        { id: 17, type: 'click', name: 'Select the Smallest', prompt: 'Click the smallest number.', items: [100, 25, 40, 5, 80, 60, 90, 30, 70], solution: 3 },
        { id: 18, type: 'click', name: 'Select the Capital Letter', prompt: 'Click the box with a capital letter.', items: ['a', 'b', 'C', 'd', 'e', 'f', 'g', 'h', 'i'], solution: 2 },

        // --- 6 x Slider CAPTCHAs (Drag to a specific position) ---
        { id: 19, type: 'slider', name: 'Set Value to 50', prompt: 'Drag the slider to exactly 50.', target: 50, range: 100 },
        { id: 20, type: 'slider', name: 'Set Value to 25', prompt: 'Drag the slider to exactly 25.', target: 25, range: 100 },
        { id: 21, type: 'slider', name: 'Set Value to 75', prompt: 'Drag the slider to exactly 75.', target: 75, range: 100 },
        { id: 22, type: 'slider', name: 'Align to the End', prompt: 'Drag the slider to the maximum value.', target: 100, range: 100 },
        { id: 23, type: 'slider', name: 'Align to the Start', prompt: 'Drag the slider to the minimum value (0).', target: 0, range: 100 },
        { id: 24, type: 'slider', name: 'Set Value to 33', prompt: 'Drag the slider to exactly 33.', target: 33, range: 100 },

        // --- 6 x Checkbox/Timer CAPTCHAs (Simulated ReCAPTCHA or timed clicks) ---
        { id: 25, type: 'checkbox', name: 'Simple Check (Simulated)', prompt: 'I am not a robot. (Click and wait 1s)', requiredWait: 1000 },
        { id: 26, type: 'checkbox', name: 'Timed Click (Min 2s)', prompt: 'Click the box and keep it checked for 2 seconds.', requiredWait: 2000 },
        { id: 27, type: 'checkbox', name: 'Fast Check (Max 0.5s)', prompt: 'Click the box, but do it within 500ms!', requiredWait: 500, fast: true },
        { id: 28, type: 'checkbox', name: 'Click & Validate', prompt: 'I am a human that appreciates well-designed CAPTCHAs.', requiredWait: 500 },
        { id: 29, type: 'checkbox', name: 'Slow Response (Min 3s)', prompt: 'Click the box and keep it checked for 3 seconds.', requiredWait: 3000 },
        { id: 30, type: 'checkbox', name: 'Quick Check (Max 1s)', prompt: 'Check the box quickly, but not instantly (under 1 second).', requiredWait: 1000, fast: true },
    ];
    // --- END CAPTCHA DEFINITIONS ---

    // Utility to enable MathJax (for nice math formatting)
    window.onload = function() {
        // Render challenge cards on load
        renderChallengeCards();
    };

    /**
     * Renders the 30 interactive challenge cards on the home screen.
     */
    function renderChallengeCards() {
        let html = '';
        CAPTCHA_CHALLENGES.forEach(c => {
            let bgColor;
            let icon;
            switch (c.type) {
                case 'math': bgColor = 'bg-red-600/20 text-red-400 border-red-600'; icon = '➗'; break;
                case 'text': bgColor = 'bg-blue-600/20 text-blue-400 border-blue-600'; icon = '📝'; break;
                case 'click': bgColor = 'bg-orange-600/20 text-orange-400 border-orange-600'; icon = '👆'; break;
                case 'slider': bgColor = 'bg-green-600/20 text-green-400 border-green-600'; icon = '🎚️'; break;
                case 'checkbox': bgColor = 'bg-indigo-600/20 text-indigo-400 border-indigo-600'; icon = '✅'; break;
            }

            html += `
                <div onclick="startChallenge(${c.id})"
                     class="${bgColor} border-2 rounded-xl p-6 shadow-xl hover:shadow-green-500/30 transition duration-300 cursor-pointer flex flex-col justify-between h-40">
                    <div>
                        <span class="text-3xl">${icon}</span>
                        <h4 class="text-xl font-bold mt-2">${c.name}</h4>
                    </div>
                    <p class="text-sm opacity-70 mt-2">${c.type.charAt(0).toUpperCase() + c.type.slice(1)} Challenge #${c.id}</p>
                </div>
            `;
        });
        challengeGrid.innerHTML = html;
    }

    /**
     * Initializes the modal with the selected CAPTCHA challenge.
     * @param {number} id - The ID of the challenge to load.
     */
    function startChallenge(id) {
        currentChallenge = CAPTCHA_CHALLENGES.find(c => c.id === id);
        if (!currentChallenge) return;

        feedbackEl.innerHTML = '';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Verify';

        // Set the appropriate HTML content based on the challenge type
        switch (currentChallenge.type) {
            case 'math':
            case 'text':
                renderTextMathChallenge();
                break;
            case 'click':
                renderClickChallenge();
                break;
            case 'slider':
                renderSliderChallenge();
                break;
            case 'checkbox':
                renderCheckboxChallenge();
                break;
        }

        modalOverlay.classList.remove('hidden');
    }

    // --- CAPTCHA Renderer Functions ---

    function renderTextMathChallenge() {
        const isMath = currentChallenge.type === 'math';
        challengeContent.innerHTML = `
            <p class="text-lg mb-4 text-gray-300 font-semibold">${currentChallenge.prompt}</p>
            <input type="${isMath ? 'number' : 'text'}" id="user-input"
                   class="w-full p-3 border-2 border-gray-600 bg-gray-700 text-white rounded-lg focus:ring-green-500 focus:border-green-500 transition"
                   placeholder="${isMath ? 'Enter numerical answer' : 'Enter text here'}"
                   onkeydown="handleEnter(event)">
        `;
    }

    function renderClickChallenge() {
        const { prompt, items } = currentChallenge;
        // The user's selection will be stored in a temporary attribute
        currentChallenge.userSelection = -1;

        challengeContent.innerHTML = `
            <p class="text-lg mb-4 text-gray-300 font-semibold">${prompt}</p>
            <div id="puzzle-grid" class="puzzle-grid">
                ${items.map((item, index) => `
                    <div class="puzzle-item" onclick="selectPuzzleItem(${index})">
                        ${item}
                    </div>
                `).join('')}
            </div>
        `;
    }

    function selectPuzzleItem(index) {
        currentChallenge.userSelection = index;
        const grid = document.getElementById('puzzle-grid');
        Array.from(grid.children).forEach((el, i) => {
            if (i === index) {
                el.classList.add('selected');
            } else {
                el.classList.remove('selected');
            }
        });
    }

    function renderSliderChallenge() {
        const { prompt, range } = currentChallenge;
        currentChallenge.sliderValue = 0; // Initial value

        challengeContent.innerHTML = `
            <p class="text-lg mb-6 text-gray-300 font-semibold">${prompt}</p>
            <div class="relative h-10 flex items-center mb-4">
                <div class="slider-track w-full"></div>
                <div id="slider-thumb" class="slider-thumb" style="left: 0%;"
                     onmousedown="startDrag(event)" ontouchstart="startDrag(event)"></div>
            </div>
            <p class="text-center text-xl font-mono text-green-400">Value: <span id="slider-display">0</span></p>
        `;
        setupSliderDrag(range);
    }

    function setupSliderDrag(max) {
        const thumb = document.getElementById('slider-thumb');
        const container = thumb.parentElement;
        const display = document.getElementById('slider-display');
        const maxRange = max;

        let isDragging = false;

        function updateSlider(clientX) {
            const rect = container.getBoundingClientRect();
            let newX = clientX - rect.left;
            newX = Math.max(0, Math.min(newX, rect.width));

            const percentage = (newX / rect.width);
            const value = Math.round(percentage * maxRange);

            thumb.style.left = (percentage * 100) + '%';
            display.textContent = value;
            currentChallenge.sliderValue = value;
        }

        function startDrag(e) {
            e.preventDefault();
            isDragging = true;
            document.addEventListener('mousemove', onDrag);
            document.addEventListener('mouseup', stopDrag);
            document.addEventListener('touchmove', onDragTouch);
            document.addEventListener('touchend', stopDrag);
            const clientX = e.clientX || e.touches[0].clientX;
            updateSlider(clientX);
        }

        function onDrag(e) {
            if (isDragging) {
                updateSlider(e.clientX);
            }
        }

        function onDragTouch(e) {
            if (isDragging) {
                updateSlider(e.touches[0].clientX);
            }
        }

        function stopDrag() {
            isDragging = false;
            document.removeEventListener('mousemove', onDrag);
            document.removeEventListener('mouseup', stopDrag);
            document.removeEventListener('touchmove', onDragTouch);
            document.removeEventListener('touchend', stopDrag);
        }

        thumb.onmousedown = startDrag;
        thumb.ontouchstart = startDrag;
    }


    function renderCheckboxChallenge() {
        const { prompt, requiredWait, fast } = currentChallenge;
        currentChallenge.checkState = { startTime: 0, endTime: 0, checked: false };
        const isMaxWait = fast;

        challengeContent.innerHTML = `
            <p class="text-lg mb-6 text-gray-300 font-semibold">${prompt}</p>
            <div class="flex items-center space-x-3 bg-gray-700 p-4 rounded-lg">
                <input type="checkbox" id="captcha-checkbox"
                       class="h-6 w-6 text-green-600 border-gray-600 rounded focus:ring-green-500 bg-gray-700"
                       onclick="handleCheckboxClick(this)">
                <label for="captcha-checkbox" class="text-white">I am not a robot</label>
            </div>
            <p id="timer-display" class="text-sm mt-3 text-gray-500"></p>
        `;
    }

    function handleCheckboxClick(checkbox) {
        const state = currentChallenge.checkState;

        if (checkbox.checked) {
            state.checked = true;
            state.startTime = Date.now();
            if (currentChallenge.fast) {
                feedbackEl.textContent = 'Timer started. Check again to submit.';
            } else {
                feedbackEl.textContent = 'Please wait...';
            }
        } else {
            state.checked = false;
            state.endTime = Date.now();
            feedbackEl.textContent = 'Ready to check.';
        }
    }


    // --- Solution Checker ---

    function handleEnter(event) {
        if (event.key === 'Enter') {
            checkSolution();
        }
    }

    function checkSolution() {
        if (!currentChallenge) return;

        let isCorrect = false;
        let message = '';
        const inputEl = document.getElementById('user-input');

        switch (currentChallenge.type) {
            case 'math':
                const mathAnswer = inputEl ? parseInt(inputEl.value) : NaN;
                if (!isNaN(mathAnswer) && mathAnswer === currentChallenge.solution) {
                    isCorrect = true;
                } else {
                    message = 'Incorrect answer. Please try again.';
                }
                break;

            case 'text':
                const textAnswer = inputEl ? inputEl.value.toUpperCase().trim() : '';
                if (textAnswer === currentChallenge.solution.toUpperCase()) {
                    isCorrect = true;
                } else {
                    message = 'Incorrect text. Pay attention to the prompt!';
                }
                break;

            case 'click':
                if (currentChallenge.userSelection === currentChallenge.solution) {
                    isCorrect = true;
                } else {
                    message = 'Incorrect selection. Click the correct item.';
                }
                break;

            case 'slider':
                if (currentChallenge.sliderValue === currentChallenge.target) {
                    isCorrect = true;
                } else {
                    message = `Slider value is ${currentChallenge.sliderValue}. Must be ${currentChallenge.target}.`;
                }
                break;

            case 'checkbox':
                const state = currentChallenge.checkState;
                const checkboxEl = document.getElementById('captcha-checkbox');

                if (!state.checked || !checkboxEl.checked) {
                    message = 'Please check the box before verifying.';
                    break;
                }

                if (state.startTime === 0) {
                    message = 'Please click the box first.';
                    break;
                }

                // If checkbox is still checked, calculate elapsed time to current time
                const checkTime = state.endTime > 0 ? state.endTime : Date.now();
                const elapsed = checkTime - state.startTime;
                const required = currentChallenge.requiredWait;

                if (currentChallenge.fast) { // Max time limit
                    if (elapsed < 50) {
                        message = 'Too fast! Bots are slow. Try again.'; // Prevent instant click success
                    } else if (elapsed <= required) {
                        isCorrect = true;
                    } else {
                        message = `Too slow! Completed in ${Math.round(elapsed/100)/10}s. Max is ${required/1000}s.`;
                    }
                } else { // Minimum time limit
                    if (elapsed >= required) {
                        isCorrect = true;
                    } else {
                        message = `Wait! Completed in ${Math.round(elapsed/100)/10}s. Min wait time is ${required/1000}s.`;
                    }
                }

                break;
        }

        // --- Handle Result ---
        if (isCorrect) {
            showSuccess();
        } else {
            feedbackEl.className = 'text-sm mt-4 font-medium text-red-500';
            feedbackEl.textContent = message;
            // Clear input for retry if it's a text/math input
            if (inputEl) inputEl.value = '';
        }
    }

    /**
     * Shows the success screen and redirects (simulated).
     */
    function showSuccess() {
        closeModal();
        // Hide the main grid and show the success page
        document.getElementById('challenge-grid').classList.add('hidden');
        document.getElementById('success-page').classList.remove('hidden');
        // Scroll to top
        window.scrollTo(0, 0);
    }

    /**
     * Resets the application state back to the challenge grid.
     */
    function resetApp() {
        document.getElementById('success-page').classList.add('hidden');
        document.getElementById('challenge-grid').classList.remove('hidden');
        currentChallenge = null;
    }

    /**
     * Closes the CAPTCHA modal.
     */
    function closeModal() {
        modalOverlay.classList.add('hidden');
        currentChallenge = null;
        feedbackEl.textContent = '';
        challengeContent.innerHTML = '';
    }

</script>
</body>
</html>
